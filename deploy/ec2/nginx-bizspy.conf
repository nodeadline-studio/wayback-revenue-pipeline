# nginx site for BizSpy backend.
# Drop into /etc/nginx/sites-available/bizspy and symlink to sites-enabled.

server {
    listen 80;
    server_name bizspy-api.leadideal.com;

    # Let Certbot handle the redirect once TLS is provisioned.
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name bizspy-api.leadideal.com;

    ssl_certificate /etc/letsencrypt/live/bizspy-api.leadideal.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bizspy-api.leadideal.com/privkey.pem;

    client_max_body_size 10m;

    # Permit cross-origin from the Netlify frontend so /api/agent/<slug>
    # can be hit directly from any IDE/agent that has project access.
    add_header Access-Control-Allow-Origin "https://bizspy.netlify.app" always;
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, X-Admin-Token" always;

    location /reports/ {
        alias /opt/bizspy-api/output/;
        autoindex off;
        types {
            application/json json;
            text/html html;
            text/markdown md;
        }
        try_files $uri =404;
    }

    location / {
        proxy_pass         http://127.0.0.1:8010;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }
}
