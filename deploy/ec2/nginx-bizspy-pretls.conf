# Pre-TLS nginx site for BizSpy. Used until certbot provisions a real cert.
# After certbot succeeds, replace this file with nginx-bizspy.conf and reload.
server {
    listen 80;
    server_name bizspy-api.leadideal.com;

    client_max_body_size 10m;

    add_header Access-Control-Allow-Origin "https://bizspy.netlify.app" always;
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, X-Admin-Token" always;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location /reports/ {
        alias /opt/bizspy-api/output/;
        autoindex off;
        types {
            application/json json;
            text/html html;
            text/markdown md;
        }
        try_files $uri =404;
    }

    location / {
        proxy_pass         http://127.0.0.1:8010;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }
}
