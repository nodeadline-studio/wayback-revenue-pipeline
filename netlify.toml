[build]
  publish = "web"
  functions = "netlify/functions"
  command = "bash scripts/build_netlify_redirects.sh"

# Redirects are written to web/_redirects at build time from BIZSPY_API_ORIGIN.
# See scripts/build_netlify_redirects.sh.
# Keep an SPA fallback here as a safety net.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
