repos:
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: |
          (?x)^(
            .*\.env.*|
            .*node_modules/.*|
            .*\.venv/.*|
            .*Archive/.*|
            .*\.secrets\.baseline$
          )$

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-added-large-files
        args: ['--maxkb=5120']
        name: "Block files larger than 5MB"
      - id: check-case-conflict
        name: Check case conflicts
      - id: end-of-file-fixer
        name: Fix end of file

  - repo: local
    hooks:
      - id: no-ds-store
        name: Block .DS_Store
        entry: bash -c 'echo "Blocked - .DS_Store files should not be committed" && exit 1'
        language: system
        files: '\.DS_Store$'
      - id: no-session-files
        name: Block .session files
        entry: bash -c 'echo "Blocked - .session files contain credentials" && exit 1'
        language: system
        files: '\.(session|session-journal)$'
      - id: no-env-files
        name: Block .env files (except examples)
        entry: bash -c 'echo "Blocked - .env files should not be committed (use .env.example)" && exit 1'
        language: system
        files: '\.env$'
        exclude: '\.(example|sample)$'
