<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Checkout | Business Spy Forensic Studio</title>
  <style>
    :root {
      --bg: #050510;
      --surface: #0a0a1a;
      --accent: #7c5cfc;
      --accent-glow: rgba(124, 92, 252, 0.4);
      --text: #ffffff;
      --muted: #88889b;
      --border: rgba(255, 255, 255, 0.1);
      --green: #00f5ff;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    .checkout-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3rem;
      max-width: 450px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }

    h1 { font-size: 1.8rem; margin-bottom: 0.5rem; }
    p { color: var(--muted); margin-bottom: 2rem; }

    #paypal-button-container {
      margin: 2rem 0;
    }

    .order-summary {
      background: rgba(255,255,255,0.03);
      border-radius: 12px;
      padding: 1.5rem;
      text-align: left;
      margin-bottom: 2rem;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 0.5rem;
    }

    .status-msg {
      margin-top: 1rem;
      font-size: 0.9rem;
      color: var(--accent);
    }
  </style>
</head>
<body>
  <div class="checkout-card">
    <h1>Complete Forensic Unlock</h1>
    <p id="pkg-desc">Associated with: <span id="user-email" style="color: white; font-weight: 600;"></span></p>

    <div class="order-summary">
      <div class="summary-row">
        <span>Plan</span>
        <span id="pkg-name" style="font-weight: 600;">Single Scan</span>
      </div>
      <div class="summary-row">
        <span>Total</span>
        <span id="pkg-price" style="font-weight: 700; color: var(--green);">$49.00</span>
      </div>
    </div>

    <div id="paypal-button-container"></div>
    <div id="status" class="status-msg"></div>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const email = urlParams.get('email');
    const packageId = urlParams.get('packageId') || 'single';

    document.getElementById('user-email').innerText = email;

    const packages = {
      'single': { name: 'Single Forensic Scan', price: '49.00' },
      'pro': { name: 'Founder Pass (5 Reports)', price: '149.00' },
      'super': { name: 'Super Tier + 20 ICP Prospects', price: '499.00' }
    };

    const pkg = packages[packageId] || packages.single;
    document.getElementById('pkg-name').innerText = pkg.name;
    document.getElementById('pkg-price').innerText = `$${pkg.price}`;

        function initPayPalButtons(clientId) {
          const sdkUrl = `https://www.paypal.com/sdk/js?client-id=${encodeURIComponent(clientId)}&currency=USD`;
          const script = document.createElement('script');
          script.src = sdkUrl;
          script.onload = function () {
          paypal.Buttons({
      createOrder: function(data, actions) {
        return fetch('/api/paypal/create-order', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            packageId: packageId,
            email: email
          })
        }).then(res => res.json()).then(order => order.id);
      },
      onApprove: function(data, actions) {
        document.getElementById('status').innerText = "Processing forensic clearance...";
        return fetch('/api/paypal/capture', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            orderId: data.orderID
          })
        }).then(res => res.json()).then(details => {
          if (details.success) {
            document.getElementById('status').innerText = "Clearance Granted. Redirecting to your Studio...";
            setTimeout(() => {
              // Redirect to the unlocked report if provided, else fallback
              window.location.href = details.report_url || '/';
            }, 2000);
          } else {
            alert('Forensic capture failed: ' + details.error);
          }
        });
      }
        }).render('#paypal-button-container');
              };
              document.body.appendChild(script);
            }

            fetch('/api/paypal-config')
              .then(r => r.json())
              .then(cfg => {
                const clientId = cfg.client_id;
                if (!clientId) {
                  document.getElementById('status').innerText = 'Payment not configured. Contact support.';
                  return;
                }
                initPayPalButtons(clientId);
              })
              .catch(() => {
                document.getElementById('status').innerText = 'Failed to load payment config. Refresh and try again.';
              });
  </script>
</body>
</html>
