<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Founder Dashboard | Business Spy Forensic Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #050510;
            --surface: #0a0a1a;
            --border: rgba(124, 92, 252, 0.2);
            --accent: #7c5cfc;
            --accent-glow: rgba(124, 92, 252, 0.4);
            --text: #ffffff;
            --muted: #8888aa;
            --gradient: linear-gradient(135deg, #7c5cfc, #ff6b6b);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 4rem 2rem;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4rem;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 1rem;
        }

        .sub-header {
            color: var(--muted);
            margin-bottom: 3rem;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
        }

        .report-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
        }

        .report-card:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .report-info h3 {
            margin: 0 0 0.5rem 0;
            font-size: 1.2rem;
        }

        .report-meta {
            font-size: 0.85rem;
            color: var(--muted);
        }

        .badge {
            padding: 0.25rem 0.75rem;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            margin-left: 1rem;
        }

        .badge-paid { background: rgba(52, 211, 153, 0.1); color: #34d399; }
        .badge-free { background: rgba(136, 136, 170, 0.1); color: var(--muted); }

        .btn-view {
            background: var(--accent);
            color: white;
            text-decoration: none;
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.9rem;
            transition: opacity 0.2s;
        }

        .btn-view:hover { opacity: 0.9; }

        .empty-state {
            text-align: center;
            padding: 4rem;
            background: rgba(124, 92, 252, 0.05);
            border: 1px dashed var(--border);
            border-radius: 24px;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
        }

        .nav-links a {
            color: var(--text);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            opacity: 0.7;
        }

        .nav-links a:hover { opacity: 1; }

        /* Unlimited tier pill */
        .badge-unlimited { background: rgba(0,245,255,0.1); color: #00f5ff; }

        /* Export/share action row */
        .report-actions {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            flex-wrap: wrap;
        }
        .btn-action {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
            padding: 0.4rem 0.75rem;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 600;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .btn-action:hover { border-color: var(--accent); color: white; }
        .btn-action.primary { background: var(--accent); border-color: var(--accent); color: white; }

        /* Mobile */
        @media (max-width: 720px) {
            .container { padding: 2rem 1rem; }
            header {
                flex-direction: column;
                align-items: flex-start;
                gap: 1rem;
                margin-bottom: 2rem;
            }
            h1 { font-size: 1.75rem; }
            .report-card {
                flex-direction: column;
                align-items: flex-start;
                gap: 1rem;
            }
            .report-actions { width: 100%; }
            .btn-view { width: 100%; text-align: center; }
        }
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">Business Spy Forensic Studio</div>
            <nav class="nav-links">
                <a href="/">New Scan</a>
                <a href="#" id="logout-btn">Logout</a>
            </nav>
        </header>

        <section id="dashboard-content">
            <h1>Forensic Archive</h1>
            <p class="sub-header">Access your previous investigative reports and strategic playbooks.</p>

            <div id="reports-list" class="dashboard-grid">
                <!-- Loaded via JS -->
                <div style="text-align: center; padding: 2rem;">Loading archive...</div>
            </div>
        </section>
    </div>

    <script>
        const SUPABASE_URL = "https://qylvmjncfblcsucfzdan.supabase.co";
        const SUPABASE_KEY = "sb_publishable_vWP7QIxV2ZUzMm8wGuefJw_0h_67DXo";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        console.log("[Dashboard] Forensic Archive bridge active.");

        let dashboardInterval;
        let currentUserTier = 'free';

        function slugFromFile(file) {
            // 'report-example-com/report.html' -> 'report-example-com'
            return (file || '').split('/')[0];
        }

        function copyText(text, label) {
            navigator.clipboard.writeText(text)
                .then(() => alert((label || 'Copied') + '!'))
                .catch(() => { prompt('Copy this:', text); });
        }

        async function mintShareLink(slug) {
            try {
                const res = await fetch(`/api/share/${slug}`, { method: 'POST' });
                const data = await res.json();
                if (data.share_url) {
                    copyText(data.share_url, 'Share link copied');
                } else {
                    alert('Could not generate share link: ' + (data.error || 'unknown error'));
                }
            } catch (e) {
                alert('Share link error: ' + e.message);
            }
        }

        async function exportAgentMD(slug) {
            try {
                const res = await fetch(`/api/agent/${slug}?format=md`);
                if (!res.ok) { alert('No agent report available yet.'); return; }
                const md = await res.text();
                copyText(md, 'Agent markdown copied');
            } catch (e) {
                alert('Export error: ' + e.message);
            }
        }

        async function loadDashboard(session) {
            const email = session?.user?.email;

            if (!email) {
                document.getElementById('reports-list').innerHTML = `
                    <div style="text-align: center; padding: 4rem;">
                        <p style="margin-bottom: 2rem;">Authentication required to access the forensic studio.</p>
                        <a href="/" class="btn-view" style="background: var(--gradient);">Return to Portal</a>
                    </div>`;
                if (dashboardInterval) clearInterval(dashboardInterval);
                return;
            }

            // Fetch tier info
            try {
                const meRes = await fetch(`/api/me?email=${encodeURIComponent(email)}`);
                if (meRes.ok) {
                    const me = await meRes.json();
                    currentUserTier = me.tier || 'free';
                    if (currentUserTier === 'unlimited') {
                        const pill = document.createElement('span');
                        pill.className = 'badge badge-unlimited';
                        pill.style.marginLeft = '1rem';
                        pill.textContent = 'UNLIMITED';
                        const logo = document.querySelector('.logo');
                        if (logo && !logo.querySelector('.badge-unlimited')) logo.appendChild(pill);
                    }
                }
            } catch (_) {}

            try {
                const resp = await fetch(`/api/user/reports?email=${encodeURIComponent(email)}`);
                const data = await resp.json();

                const list = document.getElementById('reports-list');
                if (!data.reports || data.reports.length === 0) {
                    list.innerHTML = `
                        <div class="empty-state">
                            <h3 style="margin-bottom: 0.5rem;">No intelligence on file</h3>
                            <p style="color: var(--muted); margin-bottom: 2rem;">You haven't initiated any forensic scans for this email yet.</p>
                            <a href="/" class="btn-view" style="background: var(--gradient);">Launch First Investigation</a>
                        </div>
                    `;
                    if (dashboardInterval) clearInterval(dashboardInterval);
                    return;
                }

                // Check if we need to continue polling
                const hasActive = data.reports.some(r => ['processing', 'queued', 'discovered'].includes(r.status));
                if (hasActive && !dashboardInterval) {
                    dashboardInterval = setInterval(() => loadDashboard(session), 10000);
                } else if (!hasActive && dashboardInterval) {
                    clearInterval(dashboardInterval);
                    dashboardInterval = null;
                }

                list.innerHTML = data.reports.map(report => {
                    const isProcessing = ['processing', 'queued', 'discovered'].includes(report.status);
                    const progress = report.progress || 0;

                    if (isProcessing) {
                        return `
                            <div class="report-card" style="border-left: 2px solid var(--accent);">
                                <div class="report-info" style="width: 100%;">
                                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                                        <h3>${report.target_url || 'Strategic Scan'} <span class="badge badge-paid">IN PROGRESS</span></h3>
                                        <span style="font-size: 0.8rem; font-weight: 700; color: var(--accent);">${progress}%</span>
                                    </div>
                                    <div style="background: rgba(124, 92, 252, 0.1); height: 4px; border-radius: 2px; overflow: hidden; margin-bottom: 0.5rem;">
                                        <div style="background: var(--accent); height: 100%; width: ${progress}%; transition: width 1s ease;"></div>
                                    </div>
                                    <div class="report-meta">State: ${report.stage_label || 'Initializing Neural Cluster...'}</div>
                                </div>
                            </div>
                        `;
                    }

                    return `
                        <div class="report-card">
                            <div class="report-info">
                                <h3>${report.target_url || 'Strategic Scan'} <span class="badge ${report.status === 'captured' || currentUserTier === 'unlimited' ? 'badge-paid' : 'badge-free'}">${report.status === 'captured' || currentUserTier === 'unlimited' ? 'Paid' : 'Demo'}</span></h3>
                                <div class="report-meta">Generated: ${new Date(report.created_at).toLocaleDateString()} | Package: ${report.package || 'Intelligence Artifact'}</div>
                            </div>
                            <div class="report-actions">
                                ${currentUserTier !== 'unlimited' && report.status !== 'captured' ? `<button class="btn-action" onclick="window.location.href='/checkout.html?targetUrl=${encodeURIComponent(report.target_url||'')}'" title="Unlock full report">Unlock</button>` : ''}
                                <button class="btn-action" onclick="mintShareLink('${slugFromFile(report.report_file)}')" title="Copy a shareable preview link">Share</button>
                                <button class="btn-action" onclick="exportAgentMD('${slugFromFile(report.report_file)}')" title="Copy agent markdown">Export MD</button>
                                <a href="/reports/${report.report_file}" target="_blank" class="btn-view btn-action primary">View</a>
                            </div>
                        </div>
                    `;
                }).join('');

            } catch (err) {
                console.error(err);
                document.getElementById('reports-list').innerHTML = '<div style="color: red;">Failed to connect to the Forensic Studio.</div>';
            }
        }

        // Initialize Auth
        _supabase.auth.getSession().then(({ data: { session } }) => {
            loadDashboard(session);
        });

        _supabase.auth.onAuthStateChange((_event, session) => {
            loadDashboard(session);
        });

        document.getElementById('logout-btn').addEventListener('click', async (e) => {
            e.preventDefault();
            await _supabase.auth.signOut();
            window.location.href = '/';
        });
    </script>
</body>
</html>
